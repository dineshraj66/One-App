<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Unified Dashboard for Life Management Apps">
    <title>Life Dashboard</title>
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231a1a2e' width='192' height='192'/><circle cx='96' cy='96' r='60' fill='%2300d4ff'/></svg>">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f0f1e;
            --bg-card: #1a1a2e;
            --accent-cyan: #00d4ff;
            --accent-purple: #7c3aed;
            --accent-pink: #ec4899;
            --accent-amber: #f59e0b;
            --accent-green: #10b981;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --border-color: #2d2d44;
            --gold: #ffd700;
            --gold-dark: #cc9900;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a0a2e 100%);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Header */
        .header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, rgba(26, 26, 46, 0.8) 0%, rgba(15, 15, 30, 0.4) 100%);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
            animation: slideDown 0.6s ease-out;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .medal-container {
            position: relative;
            width: 80px;
            height: 100px;
            flex-shrink: 0;
            animation: medalBounce 2s ease-in-out infinite;
        }

        .medal-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 12px rgba(255, 215, 0, 0.3));
        }

        .header-text h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold) 0%, var(--accent-cyan) 50%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            margin-bottom: 4px;
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Dashboard Grid - 2 columns */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 12px 6px;
            }
            
            .container {
                padding: 12px 6px;
                max-width: 100%;
            }

            .header {
                padding: 12px 8px;
            }

            .header-content {
                gap: 8px;
            }

            .medal-container {
                width: 50px;
                height: 65px;
            }

            .header-text h1 {
                font-size: 20px;
            }

            .header-text p {
                font-size: 12px;
            }

            /* Mobile Tile Adjustments */
            .app-tile {
                padding: 12px 10px;
                gap: 8px;
                min-height: auto;
                border-radius: 12px;
            }

            .tile-header {
                gap: 8px;
                justify-content: center;
                margin-bottom: 4px;
            }

            .tile-icon {
                width: 44px;
                height: 44px;
                font-size: 26px;
                border-radius: 8px;
            }

            /* Tile Content Mobile */
            .tile-content {
                width: 100%;
            }

            /* Progress Circle Mobile - SMALLER to prevent overlap */
            .progress-circle {
                width: 90px;
                height: 90px;
                margin: 2px auto 0;
            }

            .progress-value {
                font-size: 22px;
            }

            .progress-unit {
                font-size: 9px;
            }

            .progress-background {
                stroke-width: 6;
            }

            .progress-bar {
                stroke-width: 6;
            }

            /* Stat Display Mobile */
            .stat-display {
                padding: 10px;
                flex-direction: column;
                gap: 6px;
                width: 100%;
                text-align: center;
            }

            .stat-column {
                display: flex;
                flex-direction: column;
                gap: 3px;
                align-items: center;
            }

            .stat-label {
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.4px;
            }

            .stat-value {
                font-size: 20px;
            }
        }

        /* App Tile */
        .app-tile {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(26, 26, 46, 0.5) 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 220px;
            animation: tileReveal 0.6s ease-out backwards;
        }

        .app-tile:nth-child(1) { animation-delay: 0.1s; }
        .app-tile:nth-child(2) { animation-delay: 0.15s; }
        .app-tile:nth-child(3) { animation-delay: 0.2s; }
        .app-tile:nth-child(4) { animation-delay: 0.25s; }
        .app-tile:nth-child(5) { animation-delay: 0.3s; }
        .app-tile:nth-child(6) { animation-delay: 0.35s; }
        .app-tile:nth-child(7) { animation-delay: 0.4s; }
        .app-tile:nth-child(8) { animation-delay: 0.45s; }

        /* App Header and Title */
        .app-header {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .app-icon {
            font-size: 40px;
            flex-shrink: 0;
        }

        .app-title {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        /* Unique Colors for Each App */
        /* HappyFamily - Purple/Pink */
        .app-tile:nth-child(1) {
            background: linear-gradient(135deg, #2d1b4e 0%, #3d0051 100%);
            border-color: #d946ef;
        }

        /* PageTurn - Cyan/Blue */
        .app-tile:nth-child(2) {
            background: linear-gradient(135deg, #0f3a4a 0%, #0d5a6d 100%);
            border-color: #00d4ff;
        }

        /* DailyReminder - Indigo/Blue */
        .app-tile:nth-child(3) {
            background: linear-gradient(135deg, #1e1a4d 0%, #2d1a5f 100%);
            border-color: #818cf8;
        }

        /* LifeLog - Blue/Cyan */
        .app-tile:nth-child(4) {
            background: linear-gradient(135deg, #0c3e47 0%, #1a5f7a 100%);
            border-color: #0ea5e9;
        }

        /* TradeTracker - Green */
        .app-tile:nth-child(5) {
            background: linear-gradient(135deg, #1b3d2e 0%, #0f5f3d 100%);
            border-color: #10b981;
        }

        /* LoveToday - Amber/Orange */
        .app-tile:nth-child(6) {
            background: linear-gradient(135deg, #4a2e1a 0%, #6d3d1a 100%);
            border-color: #f59e0b;
        }

        /* CashLedger - Red */
        .app-tile:nth-child(7) {
            background: linear-gradient(135deg, #4a1a1a 0%, #6d1a1a 100%);
            border-color: #ef4444;
        }

        /* AngryBird - Pink */
        .app-tile:nth-child(8) {
            background: linear-gradient(135deg, #3d1a4a 0%, #5d1a5f 100%);
            border-color: #ec4899;
        }

        .app-tile:nth-child(1):hover { border-color: #d946ef; box-shadow: 0 20px 40px rgba(217, 70, 239, 0.15); }
        .app-tile:nth-child(2):hover { border-color: #00d4ff; box-shadow: 0 20px 40px rgba(0, 212, 255, 0.15); }
        .app-tile:nth-child(3):hover { border-color: #818cf8; box-shadow: 0 20px 40px rgba(129, 140, 248, 0.15); }
        .app-tile:nth-child(4):hover { border-color: #0ea5e9; box-shadow: 0 20px 40px rgba(14, 165, 233, 0.15); }
        .app-tile:nth-child(5):hover { border-color: #10b981; box-shadow: 0 20px 40px rgba(16, 185, 129, 0.15); }
        .app-tile:nth-child(6):hover { border-color: #f59e0b; box-shadow: 0 20px 40px rgba(245, 158, 11, 0.15); }
        .app-tile:nth-child(7):hover { border-color: #ef4444; box-shadow: 0 20px 40px rgba(239, 68, 68, 0.15); }
        .app-tile:nth-child(8):hover { border-color: #ec4899; box-shadow: 0 20px 40px rgba(236, 72, 153, 0.15); }

        /* Flash/Glow Animation for Alerts */
        @keyframes alertGlow {
            0%, 100% {
                box-shadow: 0 0 10px rgba(255, 100, 100, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
                border-color: currentColor;
            }
            50% {
                box-shadow: 0 0 30px rgba(255, 100, 100, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.2);
                border-color: #ff6464;
            }
        }

        .app-tile.alert-active {
            animation: alertGlow 1.5s ease-in-out infinite;
        }

        /* Specific alert colors */
        .app-tile:nth-child(1).alert-active {
            animation: alertGlowPurple 1.5s ease-in-out infinite;
        }

        .app-tile:nth-child(3).alert-active {
            animation: alertGlowIndigo 1.5s ease-in-out infinite;
        }

        @keyframes alertGlowPurple {
            0%, 100% {
                box-shadow: 0 0 10px rgba(217, 70, 239, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            }
            50% {
                box-shadow: 0 0 30px rgba(217, 70, 239, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            }
        }

        @keyframes alertGlowIndigo {
            0%, 100% {
                box-shadow: 0 0 10px rgba(129, 140, 248, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            }
            50% {
                box-shadow: 0 0 30px rgba(129, 140, 248, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            }
        }

        .app-tile::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease-out;
        }

        .app-tile:hover {
            transform: translateY(-8px);
            border-color: var(--accent-cyan);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .app-tile:hover::before {
            opacity: 1;
        }

        .app-tile:active {
            transform: translateY(-4px);
        }

        /* Tile Header */
        .tile-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        .tile-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            transition: transform 0.3s ease-out;
            flex-shrink: 0;
        }

        .app-tile:hover .tile-icon {
            transform: scale(1.15) rotate(8deg);
        }

        /* Tile Content */
        .tile-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .progress-circle {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 140px;
            height: 140px;
            margin: 8px auto 0;
        }

        .progress-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .progress-background {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 12;
        }

        .progress-bar {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.6s ease-out;
        }

        .progress-text {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0px;
            z-index: 10;
        }

        .progress-value {
            font-size: 36px;
            font-weight: 800;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: -1px;
            line-height: 1;
        }

        .progress-unit {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1;
        }
        }

        /* Progress Circle */
        .progress-circle {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 140px;
            height: 140px;
            margin: 16px auto;
        }

        .progress-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .progress-background {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 12;
        }

        .progress-bar {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.6s ease-out;
        }

        .progress-text {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .progress-value {
            font-size: 36px;
            font-weight: 800;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: -1px;
        }

        .progress-unit {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Simple Stat Display */
        .stat-display {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            gap: 16px;
            width: 100%;
        }

        .stat-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            font-family: 'IBM Plex Mono', monospace;
        }

        .stat-column {
            flex: 1;
        }

        /* Color Variants */
        .icon-cyan { background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 212, 255, 0.05)); color: var(--accent-cyan); }
        .icon-purple { background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(124, 58, 237, 0.05)); color: var(--accent-purple); }
        .icon-pink { background: linear-gradient(135deg, rgba(236, 72, 153, 0.2), rgba(236, 72, 153, 0.05)); color: var(--accent-pink); }
        .icon-amber { background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.05)); color: var(--accent-amber); }
        .icon-green { background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05)); color: var(--accent-green); }
        .icon-blue { background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.05)); color: #3b82f6; }
        .icon-red { background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.05)); color: #ef4444; }
        .icon-indigo { background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(99, 102, 241, 0.05)); color: #6366f1; }

        /* Loading State */
        .tile-loading {
            height: 60px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 100%);
            background-size: 200% 100%;
            border-radius: 8px;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes tileReveal {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes medalBounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        /* Error State */
        .error-state {
            color: var(--text-secondary);
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 32px 20px;
            color: var(--text-secondary);
            font-size: 12px;
            border-top: 1px solid var(--border-color);
            margin-top: 60px;
        }

        .footer a {
            color: var(--accent-cyan);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--accent-purple);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="medal-container">
                <svg class="medal-svg" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#cc2e1f;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#e63946;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#cc2e1f;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#cc9900;stop-opacity:1" />
                        </linearGradient>
                        <filter id="shadow">
                            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.4"/>
                        </filter>
                    </defs>
                    <path d="M 15 0 L 35 40 L 30 80 Q 25 90 15 100 L 20 5 Z" fill="url(#redGrad)" stroke="#8b1a13" stroke-width="0.5" filter="url(#shadow)"/>
                    <path d="M 105 0 L 85 40 L 90 80 Q 95 90 105 100 L 100 5 Z" fill="url(#redGrad)" stroke="#8b1a13" stroke-width="0.5" filter="url(#shadow)"/>
                    <circle cx="60" cy="90" r="38" fill="url(#goldGrad)" stroke="#aa7f1f" stroke-width="2" filter="url(#shadow)"/>
                    <circle cx="60" cy="90" r="35" fill="none" stroke="#e6c200" stroke-width="1" opacity="0.5"/>
                    <text x="60" y="105" font-size="32" font-weight="bold" fill="#8b6f00" text-anchor="middle" font-family="Arial, sans-serif">1</text>
                    <ellipse cx="45" cy="75" rx="12" ry="15" fill="white" opacity="0.2"/>
                </svg>
            </div>
            <div class="header-text">
                <h1>Life Dashboard</h1>
                <p class="header-subtitle">Championship Living</p>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="dashboard" id="dashboard"></div>
    </div>

    <div class="footer">
        <p>Dashboard synced in real-time • Tap an app to open it</p>
    </div>

    <!-- Load configuration FIRST -->
    <script src="config.js"></script>
    
    <!-- Firebase SDKs - Using Compat for better compatibility -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <script>
        // ============ FIREBASE INITIALIZATION ============
        // console.log('🚀 Starting Firebase initialization...');
        
        try {
            // Get HappyFamily config from config.js
            const happyFamilyConfig = getFirebaseConfig('happyFamily');
            
            // Initialize Firebase with HappyFamily config first
            firebase.initializeApp(happyFamilyConfig, 'happyfamily');
            
            // console.log('✅ Firebase initialized successfully');
            // console.log('📱 Firebase app:', firebase.app('happyfamily'));
        } catch (err) {
            console.error('❌ Firebase initialization error:', err.message);
        }

        // App Configuration in specific order: 2 columns, 4 rows
        const APPS = [
            // Row 1
            {
                id: 'happyFamily',
                name: 'HappyFamily',
                icon: '👨‍👩‍👧‍👦',
                color: 'purple',
                url: getAppUrl('happyFamily'),
                description: 'Tasks assigned to Dinesh',
                type: 'stat',
                firebaseConfig: getFirebaseConfig('happyFamily')
            },
            {
                id: 'pageTurn',
                name: 'PageTurn',
                icon: '📖',
                color: 'cyan',
                url: getAppUrl('pageTurn'),
                description: 'Current book reading progress',
                type: 'progress'
            },
            // Row 2
            {
                id: 'dailyReminder',
                name: 'Daily Reminder',

        // Initialize Dashboard
        function initDashboard() {
            const dashboard = document.getElementById('dashboard');

                dashboard.appendChild(tile);
            });

        function createTile(app) {
            const tile = document.createElement('div');
            tile.className = 'app-tile';
            
            let contentHTML = `
                <div class="tile-header">
                    <div class="tile-icon icon-${app.color}">${app.icon}</div>
                </div>
            `;

            if (app.type === 'progress') {
                contentHTML += `
                    <div class="tile-content">
                        <div class="progress-circle">
                            <svg class="progress-svg" viewBox="0 0 160 160">
                                <circle class="progress-background" cx="80" cy="80" r="70"></circle>
                                <circle class="progress-bar" cx="80" cy="80" r="70" style="stroke: var(--accent-${getColorVar(app.color)});" id="pb-${app.id}"></circle>
                            </svg>
                            <div class="progress-text">
                                <div class="progress-value" id="val-${app.id}">--</div>
                                <div class="progress-unit">%</div>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                contentHTML += `
                    <div class="tile-content">
                        <div class="stat-display">
                            <div class="stat-column">
                                <div class="stat-label">${app.description}</div>
                                <div class="stat-value" id="val-${app.id}">--</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            tile.innerHTML = contentHTML;
            
            tile.addEventListener('click', () => {
                window.location.href = app.url;
            });

            // Fetch data
            fetchAppData(app, tile);

            // Refresh every 30 seconds
            setInterval(() => fetchAppData(app, tile), 30000);

            return tile;
        }

        function getColorVar(color) {
            const colorMap = {
                'cyan': 'cyan',
                'purple': 'purple',
                'pink': 'pink',
                'amber': 'amber',
                'green': 'green',
                'blue': 'cyan',
                'red': 'pink',
                'indigo': 'purple'
            };
            return colorMap[color] || 'cyan';
        }

        async function fetchAppData(app, tile) {
            try {
                const data = await getAppMetrics(app);
                
                if (app.type === 'progress') {
                    const valueEl = tile.querySelector(`#val-${app.id}`);
                    const barEl = tile.querySelector(`#pb-${app.id}`);
                    
                    // Handle LoveToday special case: show "3/10" format
                    if (app.id === 'loveToday') {
                        const count = data.value;
                        const target = data.target;
                        valueEl.textContent = `${count}/${target}`;
                    } else {
                        const percentage = data.value;
                        valueEl.textContent = percentage;
                    }
                    
                    // Progress bar animation
                    const circumference = 2 * Math.PI * 70;
                    const offset = circumference - (data.percentage / 100) * circumference;
                    barEl.style.strokeDasharray = circumference;
                    barEl.style.strokeDashoffset = offset;
                } else {
                    const valueEl = tile.querySelector(`#val-${app.id}`);
                    valueEl.textContent = data.value;
                    
                    // Add glow effect if count > 0 for HappyFamily and DailyReminder
                    const count = parseInt(data.value) || 0;
                    if ((app.id === 'happyFamily' || app.id === 'dailyReminder') && count > 0) {
                        tile.classList.add('alert-active');
                    } else {
                        tile.classList.remove('alert-active');
                    }
                }
            } catch (error) {
                const valueEl = tile.querySelector(`[id^="val-${app.id}"]`);
                if (valueEl) valueEl.textContent = '--';
                tile.classList.remove('alert-active');
            }
        }

        async function getHappyFamilyData(db) {
            try {

                    return { value: '0' };
                }

                const tasks = snapshot.val();
                let count = 0;

                Object.keys(tasks).forEach(taskId => {
                    const task = tasks[taskId];
                    
                    if (task.items && typeof task.items === 'object') {

                    }
                });

            } catch (e) {

        // ============ PAGETURN - FIRESTORE ============
        async function getPageTurnData() {
            try {
                // console.log('🔍 getPageTurnData called');
                
                // Get PageTurn Firebase config from config.js
                const pageTurnConfig = getFirebaseConfig('pageTurn');
                
                // Initialize PageTurn Firebase app if not already done
                let pageTurnApp;
                try {
                    pageTurnApp = firebase.app('pageturn');
                } catch (e) {
                    pageTurnApp = firebase.initializeApp(pageTurnConfig, 'pageturn');
                }
                
                // Initialize Firestore for this app
                const db = pageTurnApp.firestore();
                
                // Query: Get ALL books (no where clause needed - no index!)
                const snapshot = await db
                    .collection('books')
                    .get();
                
                // console.log('📚 Total books:', snapshot.size);
                
                if (snapshot.empty) {
                    // console.log('❌ No books found');
                    return { value: '0%' };
                }

                // Filter in JavaScript: get books with status='reading' AND currentPage > 0
                // Then pick the one with highest currentPage
                let highestProgressBook = null;
                let highestProgress = 0;
                
                snapshot.forEach(doc => {
                    const bookData = doc.data();
                    // Only consider reading books with progress > 0
                    if (bookData.status === 'reading' && (bookData.currentPage || 0) > 0) {
                        const progress = bookData.currentPage || 0;
                        if (progress > highestProgress) {
                            highestProgress = progress;
                            highestProgressBook = bookData;
                        }
                    }
                });
                
                if (!highestProgressBook) {
                    // console.log('❌ No books with status "reading" and currentPage > 0');
                    return { value: '0%' };
                }
                
                const book = highestProgressBook;
                // console.log('📖 Current book:', book);
                
                // Calculate progress percentage
                const currentPage = book.currentPage || 0;
                const totalPages = book.totalPages || 1;
                const progressPercent = Math.round((currentPage / totalPages) * 100);
                
                // console.log(`✅ Progress: ${currentPage}/${totalPages} = ${progressPercent}%`);
                return { value: progressPercent };
            } catch (e) {
                console.error('❌ PageTurn error:', e);
                console.error('Stack:', e.stack);
                return { value: '--' };
            }
        }

                try {

                } catch (e) {

                }
                
                // Get Firestore instance
                const db = lifeLogApp.firestore();
                
                // Query: Get all events for user "dinesh"
                const snapshot = await db
                    .collection('userdata')
                    .doc('dinesh')
                    .collection('events')
                    .get();
                
                // console.log('📋 Events snapshot size:', snapshot.size);
                
                if (snapshot.empty) {
                    // console.log('❌ No events found');
                    return { value: '0 hrs' };
                }

                let totalMinutes = 0;

                // Loop through all events
                snapshot.forEach(doc => {
                    const event = doc.data();
                    // console.log(`🔎 Checking event:`, event);
                    
                    // Check if event has startDate and endDate
                    if (event.startDate && event.endDate) {
                        // Extract date from startDate (format: "2026-02-20T06:30")
                        const eventDate = event.startDate.split('T')[0]; // "2026-02-20"
                        // console.log(`   startDate: ${event.startDate}, date: ${eventDate}`);
                        
                        // Check if event is for today
                        if (eventDate === todayString) {
                            // Calculate duration in minutes
                            const startTime = new Date(event.startDate);
                            const endTime = new Date(event.endDate);
                            const durationMinutes = (endTime - startTime) / (1000 * 60);
                            
                            // console.log(`   ✓ TODAY'S EVENT - Duration: ${durationMinutes} minutes`);
                            totalMinutes += durationMinutes;
                        } else {
                            // console.log(`   ✗ Not today (${eventDate} != ${todayString})`);
                        }
                    }
                });

                // Convert minutes to hours with decimal
                const totalHours = (totalMinutes / 60).toFixed(1);
                // console.log(`✅ Final total: ${totalMinutes} minutes = ${totalHours} hours`);
                return { value: `${totalHours} hrs` };
            } catch (e) {
                console.error('❌ LifeLog error:', e);
                console.error('Stack:', e.stack);
                return { value: '--' };
            }
        }
